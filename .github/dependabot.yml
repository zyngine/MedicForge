# MedicForge — Dependabot configuration
# Place this file at: .github/dependabot.yml in the zyngine/MedicForge repo
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
 
version: 2
updates:
 
  # ---------- npm (the main app) ----------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 8
    target-branch: "main"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # Group all patch + minor bumps into one PR per week so we don't drown in PRs.
    # Major bumps stay as individual PRs so they get explicit review.
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # Group security patches separately so they're easy to spot and merge fast.
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Pinned by intent — bump these manually after manual smoke test.
      # (See Apr 27 IT report — react/react-dom/eslint-config-next are pinned in package.json.)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Major bumps that are known-disruptive — flag in monthly review, not weekly.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "read-excel-file"
        update-types: ["version-update:semver-major"]
    reviewers:
      - "zyngine"   # adjust to actual GitHub handle if different
 
  # ---------- GitHub Actions ----------
  # Keeps any reusable actions in .github/workflows/* up to date.
  # Cheap to enable; uncomment if/when you add workflows.
