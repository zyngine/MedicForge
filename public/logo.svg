<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120">
  <defs>
    <!-- Red gradient to match "Medic" -->
    <linearGradient id="medicRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53E3E"/>
      <stop offset="100%" style="stop-color:#C53030"/>
    </linearGradient>

    <!-- Gray gradient to match "Forge" -->
    <linearGradient id="forgeGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5568"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>

    <!-- Gold/ember accent for forge element -->
    <linearGradient id="emberAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6AD55"/>
      <stop offset="50%" style="stop-color:#ED8936"/>
      <stop offset="100%" style="stop-color:#C05621"/>
    </linearGradient>

    <!-- Pulse glow -->
    <filter id="pulseGlow2">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circular badge -->
  <g transform="translate(55, 58)">
    <!-- Outer ring - gray -->
    <circle cx="0" cy="0" r="48" fill="url(#forgeGray)"/>

    <!-- Red trim ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#C53030" stroke-width="2"/>

    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="40" fill="#1A202C"/>

    <!-- Star of Life in red -->
    <g fill="url(#medicRed)">
      <!-- Vertical bar (0°) -->
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12"/>

      <!-- Bar at 60° -->
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12" transform="rotate(60)"/>

      <!-- Bar at 120° -->
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12" transform="rotate(120)"/>
    </g>

    <!-- Subtle dark lines to define the arms -->
    <g fill="none" stroke="#7F1D1D" stroke-width="0.5" opacity="0.4">
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12"/>
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12" transform="rotate(60)"/>
      <polygon points="-8,-35 8,-35 8,-12 12,-12 12,12 8,12 8,35 -8,35 -8,12 -12,12 -12,-12 -8,-12" transform="rotate(120)"/>
    </g>

    <!-- Center circle - gray -->
    <circle cx="0" cy="0" r="12" fill="#2D3748"/>

    <!-- Rod of Asclepius -->
    <rect x="-1.5" y="-8" width="3" height="16" rx="0.5" fill="#A0AEC0"/>
    <path d="M-1,-6 Q-5,-4 -4,0 Q-3,3 1,2 Q5,1 4,4 Q3,7 0,8"
          fill="none"
          stroke="#E2E8F0"
          stroke-width="1.5"
          stroke-linecap="round"/>

    <!-- Small forge flames/embers at the tips -->
    <g fill="url(#emberAccent)" opacity="0.85">
      <path d="M0,-40 Q-3,-38 0,-35 Q3,-38 0,-40" />
      <path d="M0,40 Q-3,38 0,35 Q3,38 0,40" />
      <path d="M34.6,-20 Q33,-23 30.3,-17.5 Q35,-18 34.6,-20" />
      <path d="M-34.6,-20 Q-33,-23 -30.3,-17.5 Q-35,-18 -34.6,-20" />
      <path d="M34.6,20 Q33,23 30.3,17.5 Q35,18 34.6,20" />
      <path d="M-34.6,20 Q-33,23 -30.3,17.5 Q-35,18 -34.6,20" />
    </g>
  </g>

  <!-- Text: MedicForge -->
  <text x="120" y="50" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700">
    <tspan fill="#C53030">Medic</tspan><tspan fill="#2D3748">Forge</tspan>
  </text>

  <!-- Realistic Sinus Rhythm ECG -->
  <g filter="url(#pulseGlow2)" transform="translate(120, 68)">
    <polyline
      points="0,0
              20,0
              25,-2 27,0
              32,0
              35,-3
              38,0
              42,0
              45,-22
              48,12
              51,-3
              54,0
              58,0
              62,3 65,4 70,4 75,3 80,0
              90,0
              95,-2 97,0
              102,0
              105,-3
              108,0
              112,0
              115,-22
              118,12
              121,-3
              124,0
              128,0
              132,3 135,4 140,4 145,3 150,0
              160,0
              165,-2 167,0
              172,0
              175,-3
              178,0
              182,0
              185,-22
              188,12
              191,-3
              194,0
              198,0
              202,3 205,4 210,4 215,3 220,0
              235,0"
      fill="none"
      stroke="#E53E3E"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Tagline -->
  <text x="122" y="100" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#4A5568" letter-spacing="2.5">
    EMS TRAINING PLATFORM
  </text>
</svg>